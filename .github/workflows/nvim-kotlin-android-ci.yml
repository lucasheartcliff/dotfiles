name: nvim-kotlin-android-ci

on:
  push:
    paths:
      - "neovim/.config/nvim/**"
      - ".github/workflows/nvim-kotlin-android-ci.yml"
  pull_request:
    paths:
      - "neovim/.config/nvim/**"
      - ".github/workflows/nvim-kotlin-android-ci.yml"

jobs:
  test-kotlin-android:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            neovim \
            git \
            curl \
            unzip \
            ripgrep \
            fd-find \
            default-jre-headless \
            python3 \
            python3-pip

      - name: Show tool versions
        run: |
          nvim --version | head -n 3
          java -version
          python3 --version

      - name: Run Neovim Kotlin/Android CI checks
        run: |
          chmod +x neovim/.config/nvim/tests/ci/kotlin_android_ci.sh
          neovim/.config/nvim/tests/ci/kotlin_android_ci.sh
